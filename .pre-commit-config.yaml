repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ruff runs from the project venv (single source of truth with `make
  # lint`/CI) — a pinned mirror version drifts and disagrees on formatting.
  - repo: local
    hooks:
      - id: ruff
        name: ruff check (project venv)
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format (project venv)
        entry: uv run ruff format
        language: system
        types: [python]

  # mypy runs in the project's uv venv (via `uv run`), NOT an isolated
  # pre-commit env: --strict resolves the real third-party stubs
  # (httpx, structlog, fastapi, torch, lightgbm, …). An isolated hook with a
  # hand-listed `additional_dependencies` drifts and floods with
  # import-not-found. `files=[src, geodata/src]` lives in pyproject's
  # [tool.mypy]; pass_filenames=false lets mypy use it.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict, project venv)
        entry: uv run mypy --config-file=pyproject.toml
        language: system
        types: [python]
        pass_filenames: false
