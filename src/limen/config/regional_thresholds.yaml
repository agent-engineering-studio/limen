# Regional thresholds & deterministic-scoring parameters for Limen V1.
#
# This file is the SINGLE SOURCE OF TRUTH for every numeric knob in the
# deterministic scoring engine. The engine reads it via
# `limen.core.scoring.regional_thresholds.load_regional_thresholds` and
# validates it through the matching Pydantic schema. Changing a value
# here changes engine output; there are no hard-coded constants in the
# scoring code (one of the acceptance criteria).
#
# References (per project doc §2.4 / §2.5):
#   * Caine 1980 — Power-law rainfall I/D threshold for shallow landslides
#   * Brunetti et al. 2010, Peruccacci et al. 2017 — Italian regional
#     calibration of Caine parameters
#   * Melillo et al. 2018 — Rainfall-event reconstruction
#   * Kohler & Linsley 1951 — Antecedent precipitation index decay

model_version: "limen-deterministic-v1"

# Top-level component weights for the final risk = sum(w_i · component_i).
weights:
  static:    0.35   # w_S
  meteo:     0.40   # w_M
  seismic:   0.15   # w_E
  fire:      0.07   # w_F
  hydrology: 0.03   # w_H (always 0 in V1; reserved for V1.5+)

# Sub-weights inside S(c) (static, time-invariant).
# GeoServer is the authoritative source for the static inputs (IFFI landslide
# inventory + PAI hazard) and the DTM feeds `slope`. ISPRA susceptibility is
# no longer an input (not served by GeoServer), so `susc_ispra` is 0 and its
# former 0.30 weight is redistributed proportionally onto IFFI + slope + PAI.
static:
  weights:
    susc_ispra:      0.00
    iffi_density:    0.375
    slope:           0.30
    pai:             0.225
    litho_weight:    0.10
  # Slope (degrees) is normalised by a piecewise-linear ramp from 0° to a
  # cap value; above the cap, the term saturates at 1.
  slope_saturation_deg: 45.0
  # IFFI-density saturation: features-within-500 m at which the IFFI term
  # reaches 1.0. Balances recall vs discrimination on the ITALICA ground
  # truth: at 8 the gauge-rain recall stays 72% (>70% target) while cells
  # below it discriminate, instead of every IFFI cell saturating at the old
  # hard-coded 3.0 (which flattened S after the ~5x density-query fix).
  iffi_density_saturation: 8.0

# Sub-weights inside M(c, t) (meteo, time-varying).
meteo:
  weights:
    caine:           0.45
    api:             0.30
    soil:            0.25

# Caine power law I = α · D^(-β). Per macroregion (Italy).
# RECALIBRATED (2026-07) against the e-ITALICA catalogue: a T5 lower-envelope
# power-law fit (Peruccacci-style, 5th-percentile of log-residuals) over the
# gauge-measured triggering (I, D) pairs — 5974 events nationally. Each
# macroregion's threshold now sits below ~95% of its real triggering events
# (the shipped Brunetti-2010 7.7/0.39 default left 36% of real landslides
# BELOW threshold → caine≈0). β is steeper (~0.5–0.65) than the old 0.39.
# Measured effect on the gauge-rain validation: ≥Moderate 46.6% → 63.0%,
# High 0.2% → 2.7%. Calibration jobs can still override per-AOI.
caine:
  # Event reconstruction (Melillo 2018-inspired): hours of no-rain that
  # break an "event" into two events; minimum total mm to qualify as an
  # event.
  event_reconstruction:
    no_rain_break_hours: 6
    min_event_mm:        2.0
  # I-units: mm/h; D-units: h.
  macroregions:
    italy_default:
      alpha: 7.190
      beta:  0.568
    southern_italy:        # ITALICA T5, southern regions (Puglia..Sicilia)
      alpha: 8.750
      beta:  0.645
    central_italy:
      alpha: 7.950
      beta:  0.608
    northern_italy:
      alpha: 6.370
      beta:  0.512

# Antecedent Precipitation Index parameters.
# Kohler-Linsley: API_t = k · API_{t-1} + P_t (we approximate with a
# rolling sum at horizons 30/60/90 d). The factor is a logistic transform
# of the standardised anomaly vs the per-cell monthly baseline.
api:
  horizon_days:      30
  decay_k:           0.95
  sigmoid_sigma_mm:  60.0    # σ_API for the standardised anomaly
  baseline:
    # When per-cell baseline isn't available yet (Phase 3 has no
    # climatology pipeline), fall back to this scalar in mm. Replace
    # in a later prompt with cell+month climatology.
    fallback_mm:     80.0

soil:
  # Soil-moisture factor: sigmoid centred at sm_50 with steepness k.
  # Source values are m³/m³ from Open-Meteo (0..1 range).
  sigmoid_center:    0.30
  sigmoid_steepness: 12.0

# Dynamic flood forecast (issue #8): uplift the hydrology quota H when a flood
# is FORECAST over a cell in an ISPRA hydraulic-hazard zone. Multi-source:
#   pluvial  — forecast 72h rain (Open-Meteo forecast)
#   fluvial  — river-discharge ratio vs normal (Open-Meteo Flood API / GloFAS)
#   coastal  — sea surge / wave signal (Open-Meteo Marine API)
# bonus = hazard_uplift · flood_hazard_norm · max(pluvial, fluvial, coastal).
# Nessun forecast ⇒ bonus 0 ⇒ H puramente statico (byte-identico a V1). La
# pericolosità statica ISPRA (Mosaicatura Idraulica / PGRA) resta la base che
# scala l'uplift. Regionalizzato: pioggia "da piena" in Puglia ≠ Liguria.
flood_forecast:
  hazard_uplift:              0.5
  discharge_ratio_center:     2.0    # portata prevista = 2× la normale stagionale
  discharge_ratio_steepness:  0.8
  macroregions:
    italy_default:
      center_mm:     90.0
      steepness_mm:  35.0
    southern_italy:
      center_mm:     80.0
      steepness_mm:  30.0
    central_italy:
      center_mm:     95.0
      steepness_mm:  35.0
    northern_italy:
      center_mm:    110.0
      steepness_mm:  40.0

# Rain floor (issue #20): a SECOND, more permissive Caine I/D envelope that
# BYPASSES the susceptibility tier. It's a correctness property, not a tuning
# knob: a national EWS must never miss an exceptional rain event on a cell
# catalogued as low-susceptibility (usually because the IFFI inventory is
# incomplete, not because the slope is stable). Any cell whose rainfall crosses
# this floor is scored by the MultiFactorScoringEngine regardless of tier.
#
# `alpha`/`beta`: T2 lower envelope (2nd-percentile of log-residuals) per
# macroregion — below the operational T5 in `caine.macroregions.*`, so it
# "rescues" more events. Current values are ~0.6·α_T5 placeholders: re-fit on
# e-ITALICA exactly like the T5 caine block; calibration can override per-AOI.
# `wetness_min`: the floor is CONDITIONED on antecedent wetness (the soil-
# moisture 0–7 cm sigmoid, same `soil` block). A dry cell is NOT rescued at the
# same rainfall as a saturated one — no flat mm floor. Regionalised for the
# same reason the caine thresholds are (extreme rain in Puglia is ordinary in
# Liguria or on the Alps).
rain_floor:
  wetness_min: 0.5
  macroregions:
    italy_default:
      alpha: 4.30
      beta:  0.568
    southern_italy:
      alpha: 5.25
      beta:  0.645
    central_italy:
      alpha: 4.75
      beta:  0.608
    northern_italy:
      alpha: 3.80
      beta:  0.512

# Rain-on-snow amplification (additive M bonus, baseline-preserving).
# With a standing snowpack (>= ros_min_depth_m), rain over the last 24 h
# loads the pack and adds melt water — a documented Alpine/Apennine
# landslide trigger the engine previously ignored. The factor ramps to 1
# at ros_rain_scale_mm of 24h rain and adds at most `weight` to M.
# No snowpack => factor 0 => scores identical to the pre-snow engine.
snow:
  ros_min_depth_m:   0.05
  ros_rain_scale_mm: 30.0
  weight:            0.15

# Seismic decay.
seismic:
  tau_days:           2.0
  min_magnitude:      3.5
  lookback_days:      7
  pga_threshold_g:    0.05      # 0.05 g threshold per §2.4
  pga_scale_g:        0.05      # σ in the sigmoid

# Post-fire window.
post_fire:
  peak_months:        6.0
  curve_denominator: 50.0
  window_months_max: 24.0

# V1.5 — Kinematic component K (per §2.9). Only contributes when a
# calibrated displacement sensor is present in the bundle's
# `sensor_features`. Defaults are conservative literature values for
# slow-moving landslides; per-site calibration via per-cell metadata
# can override at runtime.
kinematic:
  v_threshold_mmd:        5.0     # mm / day — velocity at sigmoid centre
  sigma_v:                3.0     # mm / day — sigmoid steepness
  acceleration_alarm_mmd2: 2.0    # mm / day² — hard escalation
  inverse_velocity_alarm:  0.10   # days / mm — Fukuzono failure proxy
  weights:
    k:                    0.20    # share of the final score when K is active

# Final classification cutoffs. Inclusive lower bound, exclusive upper
# bound, except for the final class which is inclusive on both sides.
classes:
  none:      [0.00, 0.15]
  low:       [0.15, 0.35]
  moderate:  [0.35, 0.55]
  high:      [0.55, 0.75]
  very_high: [0.75, 1.00]

# Fattore di ESPOSIZIONE per la priorità degli alert (endpoint /api/alerts
# e dispatcher). NON entra nello scoring: priority = score * (1 + fattore),
# cappato a `cap`. Strade/ferrovie graduate per distanza dalla rete OSM
# (motorway/trunk/primary/secondary + railway=rail); quando la rete OSM non
# dà contributo (non ingerita o oltre le bande) valgono i fallback sui flag
# CORINE 12x, che coprono anche industriale/porti/aeroporti.
exposure:
  urban_here:          1.0    # tessuto urbano CORINE 11x nella cella
  urban_near:          0.5    # entro ~2 km
  road_strong_m:       250.0  # strada principale sotto questa distanza
  road_strong:         0.6
  road_medium_m:       1000.0
  road_medium:         0.3
  rail_strong_m:       250.0
  rail_strong:         0.5
  rail_medium_m:       1000.0
  rail_medium:         0.25
  infra_here_fallback: 0.6    # CORINE 12x nella cella (distanze OSM NULL)
  infra_near_fallback: 0.3    # CORINE 12x entro ~2 km
  cap:                 2.0

# Mapping presentazionale verso la scala di allerta della Protezione
# Civile (verde/gialla/arancione/rossa). Solo etichette per API,
# legenda e notifiche: gli score e le classi NON cambiano.
pc_alert:
  none:      verde
  low:       verde
  moderate:  gialla
  high:      arancione
  very_high: rossa

# Target annual class-frequency distribution (§2.5). The calibration
# CLI emits a report comparing achieved frequencies against this target
# so analysts can tune weights.
target_distribution:
  none:      0.700
  low:       0.200
  moderate:  0.070
  high:      0.025
  very_high: 0.005

# Calibration gate (§2.5 step 2).
# DISABLED: with ISPRA susceptibility removed from S (GeoServer does not serve
# it), the S↔ISPRA correlation gate is no longer measurable. `null` turns it
# off; the §2.5 backtest below remains the acceptance criterion.
calibration:
  s_vs_ispra_correlation_min: null
  backtest:
    hit_rate_min:            0.70
    far_max:                 0.30
    lead_time_hours_min:     18.0
