# Full demo stack: Postgres + PostGIS + Limen API.
#
# Brings up the database and the FastAPI app in a single command:
#
#     docker compose -f infra/docker/docker-compose.demo.yml up -d --build
#
# The API points at the local Postgres by default. To target Neon
# instead, override DB__CONNECTION_STRING (and keep
# SCHEDULER__CACHE_CLEANUP=apscheduler) — no other change needed:
#
#     DB__CONNECTION_STRING="postgresql://...neon.tech/...?sslmode=require" \
#     docker compose -f infra/docker/docker-compose.demo.yml up -d --build api

name: limen-demo

services:
  postgres:
    build:
      context: ../postgres
      dockerfile: Dockerfile.db
    image: limen/postgres:16-3.5
    container_name: limen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: limen
      POSTGRES_PASSWORD: limen
      POSTGRES_DB: limen
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - limen-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U limen -d limen"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    image: limen/api:0.1
    container_name: limen-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Override these via the shell to point at Neon or a managed PG.
      DB__CONNECTION_STRING: postgresql://limen:limen@postgres:5432/limen
      OBJECT_STORE__BACKEND: filesystem
      OBJECT_STORE__ROOT: /var/lib/limen/objects
      SCHEDULER__CACHE_CLEANUP: apscheduler
      API__HOST: 0.0.0.0
      API__PG_TILESERV_URL: http://pg_tileserv:7800
      # Notifications — listing a channel here enables it; channels
      # whose creds are missing degrade to a no-op rather than erroring.
      # NOTIFICATIONS__ENABLED_CHANNELS: '["mqtt"]'
      NOTIFICATIONS__MQTT__BROKER_HOST: mosquitto
      NOTIFICATIONS__MQTT__BROKER_PORT: "1883"
      NOTIFICATIONS__MQTT__TOPIC: limen/alerts
      ALERT__MIN_LEVEL: High
      ALERT__DEDUP_WINDOW_MINUTES: "180"
      API__PORT: "8080"
      LOG_JSON: "true"
      # Optional LLM credentials — when unset, the resolver falls back
      # to Ollama at LLM__OLLAMA_BASE_URL (which is not exposed by this
      # compose file in V1).
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # OPENAI_API_KEY:    ${OPENAI_API_KEY}
      # V2.x — KG advisory grounding. OFF by default. Enable by setting
      # KG__ENABLED=true and pointing KG__BASE_URL at the sidecar service
      # under the `kg` profile (or an external host).
      KG__ENABLED: "false"
      KG__BASE_URL: http://knowledge-graph:8000
      KG__THREAD_ID: landslide-kb
      KG__TIMEOUT_SECONDS: "3.0"
      KG__CACHE_TTL_SECONDS: "3600"
    ports:
      - "8080:8080"
    volumes:
      - limen-objects:/var/lib/limen/objects
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/ready', timeout=3).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  mosquitto:
    # Phase 7 — local MQTT broker for the alert pipeline. The API
    # publishes to ``${NOTIFICATIONS__MQTT__BROKER_HOST}`` (default
    # mosquitto:1883); enable the channel by listing "mqtt" in
    # NOTIFICATIONS__ENABLED_CHANNELS. The default mosquitto.conf
    # below allows anonymous connections — fine for local demos,
    # tighten for production.
    image: eclipse-mosquitto:2.0
    container_name: limen-mosquitto
    restart: unless-stopped
    command: ["mosquitto", "-c", "/mosquitto-no-auth.conf"]
    ports:
      - "1883:1883"
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -t healthz -E -W 2 || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  pg_tileserv:
    # Phase 6 — vector tile server pointed at the same Postgres+PostGIS.
    # The frontend talks to `${VITE_API_URL}/api/tiles/...`, the FastAPI
    # /api/tiles endpoint 307-redirects here. To target Neon or any
    # other PG, point CrunchyData/pg_tileserv at it via DATABASE_URL.
    image: ghcr.io/crunchydata/pg_tileserv:latest
    container_name: limen-pg-tileserv
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://limen:limen@postgres:5432/limen?sslmode=disable
      # Read-only; pg_tileserv auto-discovers tables/functions allowed
      # by the role's permissions. Restrict in production by creating
      # a dedicated `tile_reader` role.
      TS_HTTPHOST: "0.0.0.0"
      TS_HTTPPORT: "7800"
    ports:
      - "7800:7800"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7800/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    # Phase 6 — Vite dev server. In production, build with
    # `npm run build` and either copy `dist/` into the api image
    # (FastAPI can serve it statically — see README) or front it with
    # nginx; this service is a convenience for local iteration.
    image: node:22-bookworm-slim
    container_name: limen-frontend
    working_dir: /app
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_TILESERV_URL: http://localhost:7800
    command: ["sh", "-c", "npm ci --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port 5173"]
    volumes:
      - ../../frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "5173:5173"
    profiles: ["frontend"]  # opt-in: `docker compose --profile frontend up`

  knowledge-graph:
    # V2.x — advisory knowledge-graph sidecar (Neo4j + Redis + Ollama +
    # FastAPI + MCP). Opt-in via `docker compose --profile kg up`. The
    # actual image is owned by the team's `knowledge-graph` repository;
    # this entry only sketches the port + LLM-coherence env. Production
    # deployments should pin a tagged image and run it inside the same
    # EU-region network as the Limen API.
    #
    # IMPORTANT: this sidecar is **advisory only**. Limen's deterministic
    # scoring loop runs unchanged when this service is unavailable.
    image: ghcr.io/agent-engineering-studio/knowledge-graph:latest
    container_name: limen-knowledge-graph
    restart: unless-stopped
    environment:
      # Provider coherence — the sidecar uses the same LLM the rest of
      # Limen does (resolver order: Anthropic → OpenAI → Foundry → Ollama).
      # On Aruba prod this typically resolves to a local Ollama; on dev
      # it can be Anthropic/OpenAI via the host's env.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${LLM__OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      NEO4J_URI: ${KG_NEO4J_URI:-bolt://neo4j:7687}
      REDIS_URL: ${KG_REDIS_URL:-redis://redis:6379/0}
    ports:
      - "8001:8000"
    profiles: ["kg"]
    # No healthcheck wired — the sidecar is advisory; nothing in Limen's
    # critical path waits on it.

volumes:
  limen-pgdata:
    name: limen-pgdata
  limen-objects:
    name: limen-objects
  frontend-node-modules:
    name: limen-frontend-node-modules
